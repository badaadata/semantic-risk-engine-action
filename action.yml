name: Semantic SQL Risk Check
description: Detect breaking semantic changes in dbt SQL models before they merge.
author: badaadata

inputs:
  api_key:
    description: "Your Semantic Risk Engine API key (sre_...)"
    required: true
  dialect:
    description: "SQL dialect (snowflake | bigquery | databricks | duckdb | redshift)"
    required: false
    default: snowflake
  dbt_profiles_dir:
    description: "Directory containing profiles.yml"
    required: false
    default: "."
  dbt_target:
    description: "dbt target name to use for compilation"
    required: false
    default: ci
  api_base_url:
    description: "Advanced: base URL for the Semantic Risk Engine API (override for local/ngrok testing). Must be https:// — non-HTTPS URLs are rejected."
    required: false
    default: "https://api.badaadata.com"
  debug:
    description: "Print model names and compiled-SQL sizes to the workflow log for troubleshooting. Never prints SQL content."
    required: false
    default: "false"

outputs:
  highest_severity:
    description: "Highest risk severity found this run: HIGH, MEDIUM, LOW, INFO, or NONE (also NONE if no models changed or analysis couldn't complete)."
    value: ${{ steps.post-comment.outputs.highest_severity || steps.compile-head.outputs.highest_severity || steps.skip-no-changes.outputs.highest_severity }}

branding:
  icon: shield
  color: blue

runs:
  using: composite
  steps:
    - name: Find changed SQL models
      shell: bash
      env:
        SRE_BASE_REF: ${{ github.event.pull_request.base.ref }}
      run: |
        git diff --name-only "origin/$SRE_BASE_REF...HEAD" -- 'models/' \
          | grep '\.sql$' > /tmp/sre_changed_models.txt || true

        echo "Changed models:"
        cat /tmp/sre_changed_models.txt || echo "(none)"

        if [ ! -s /tmp/sre_changed_models.txt ]; then
          echo "SRE_NO_CHANGES=true" >> $GITHUB_ENV
        fi

    - name: Compile PR branch (HEAD)
      id: compile-head
      if: env.SRE_NO_CHANGES != 'true'
      shell: bash
      env:
        SRE_DBT_PROFILES_DIR: ${{ inputs.dbt_profiles_dir }}
        SRE_DBT_TARGET: ${{ inputs.dbt_target }}
      run: |
        echo "SRE_HEAD_REF=$(git rev-parse HEAD)" >> $GITHUB_ENV

        SELECTORS=$(cat /tmp/sre_changed_models.txt \
          | xargs -I{} basename {} .sql \
          | tr '\n' ' ')
        echo "Compiling PR branch models: $SELECTORS"

        dbt compile \
            --select $SELECTORS \
            --profiles-dir "$SRE_DBT_PROFILES_DIR" \
            --target "$SRE_DBT_TARGET" \
          || dbt compile \
            --select $SELECTORS \
            --profiles-dir "$SRE_DBT_PROFILES_DIR" \
            --target "$SRE_DBT_TARGET" \
            --empty \
          || echo "PR-branch compile failed — continuing in shadow mode"

        if [ -d target/compiled ] && [ -f target/manifest.json ]; then
          cp -r target/compiled /tmp/sre_head_compiled
          cp target/manifest.json /tmp/sre_manifest.json
        else
          echo "::warning::Semantic Risk Check: dbt compile failed on the PR branch — skipping analysis this run. This does not block your merge."
          echo "SRE_COMPILE_FAILED=true" >> $GITHUB_ENV
          echo "highest_severity=NONE" >> "$GITHUB_OUTPUT"
        fi

    - name: Compile base branch
      if: env.SRE_NO_CHANGES != 'true' && env.SRE_COMPILE_FAILED != 'true'
      shell: bash
      env:
        SRE_BASE_REF: ${{ github.event.pull_request.base.ref }}
        SRE_DBT_PROFILES_DIR: ${{ inputs.dbt_profiles_dir }}
        SRE_DBT_TARGET: ${{ inputs.dbt_target }}
      run: |
        git checkout "origin/$SRE_BASE_REF"

        SELECTORS=$(cat /tmp/sre_changed_models.txt \
          | xargs -I{} basename {} .sql \
          | tr '\n' ' ')

        dbt compile \
            --select $SELECTORS \
            --profiles-dir "$SRE_DBT_PROFILES_DIR" \
            --target "$SRE_DBT_TARGET" \
          || dbt compile \
            --select $SELECTORS \
            --profiles-dir "$SRE_DBT_PROFILES_DIR" \
            --target "$SRE_DBT_TARGET" \
            --empty \
          || echo "Base compile failed (model may be new) — continuing"

        [ -d target/compiled ] && cp -r target/compiled /tmp/sre_base_compiled \
          || mkdir -p /tmp/sre_base_compiled

        git checkout $SRE_HEAD_REF

    - name: Build payload and call API
      if: env.SRE_NO_CHANGES != 'true' && env.SRE_COMPILE_FAILED != 'true'
      shell: bash
      env:
        SRE_API_KEY: ${{ inputs.api_key }}
        SRE_DIALECT: ${{ inputs.dialect }}
        SRE_PR_URL: ${{ github.event.pull_request.html_url }}
        SRE_API_BASE_URL: ${{ inputs.api_base_url }}
        SRE_DEBUG: ${{ inputs.debug }}
      run: |
        python3 ${{ github.action_path }}/scripts/build_payload.py \
          --changed /tmp/sre_changed_models.txt \
          --base-dir /tmp/sre_base_compiled \
          --head-dir /tmp/sre_head_compiled \
          --manifest /tmp/sre_manifest.json \
          --dialect "$SRE_DIALECT" \
          --skipped /tmp/sre_skipped_models.json \
          --pr-url "$SRE_PR_URL" \
          --repo "${{ github.repository }}" \
          --pr-number "${{ github.event.pull_request.number }}" \
          --debug "$SRE_DEBUG" \
          > /tmp/sre_payload.json

        python3 ${{ github.action_path }}/scripts/call_api.py \
          --payload /tmp/sre_payload.json \
          --api-url "$SRE_API_BASE_URL/v1/analyze" \
          > /tmp/sre_response.json

    - name: Post PR comment
      id: post-comment
      if: env.SRE_NO_CHANGES != 'true' && env.SRE_COMPILE_FAILED != 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SRE_API_BASE_URL: ${{ inputs.api_base_url }}
      run: |
        python3 ${{ github.action_path }}/scripts/post_comment.py \
          --response /tmp/sre_response.json \
          --manifest /tmp/sre_manifest.json \
          --repo ${{ github.repository }} \
          --pr ${{ github.event.pull_request.number }} \
          --sha $SRE_HEAD_REF \
          --skipped /tmp/sre_skipped_models.json \
          --api-base-url "$SRE_API_BASE_URL"

    - name: Skip — no SQL model changes
      id: skip-no-changes
      if: env.SRE_NO_CHANGES == 'true'
      shell: bash
      run: |
        echo "No SQL model changes detected in models/. Skipping semantic risk check."
        echo "highest_severity=NONE" >> "$GITHUB_OUTPUT"
